name: Build ALL and Publish Release
on: [push]
jobs:
  Compile-Release:
    runs-on: ubuntu-latest
    container:
      image: motolegacy/fteqw
    steps:
      - uses: actions/checkout@v2
      - name: Build
        working-directory: ./
        run: |
          cd tools/
          sh build-nzp-all.sh
      - name: Generate Build Date
        id: date
        run: echo "::set-output name=date::$(date +'%Y-%m-%d-%H-%M-%S')"
      - name: Delete Old Release
        uses: dev-drprasad/delete-tag-and-release@v0.2.0
        with:
          delete_release: true
          tag_name: bleeding-edge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: bleeding-edge
          release_name: Automated Release ${{ steps.date.outputs.date }}
          body: |
            This is a **bleeding edge** NZ:P FTE release, stability is not guarenteed.

            To install:
            - Grab the .ZIP archive for your platform.
            - Extract the contents of the .ZIP archive to your game directory (place where you have the 'nzp' folder).
          draft: true
          prerelease: false
      - name: Upload linux_arm64 Archive
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./tmp/pc-nzp-linux_arm64.zip
          asset_name: pc-nzp-linux_arm64.zip
          asset_content_type: application/zip
      - name: Upload linux_armhf Archive
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./tmp/pc-nzp-linux_armhf.zip
          asset_name: pc-nzp-linux_armhf.zip
          asset_content_type: application/zip
      - name: Upload linux32 Archive
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./tmp/pc-nzp-linux32.zip
          asset_name: pc-nzp-linux32.zip
          asset_content_type: application/zip
      - name: Upload linux64 Archive
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./tmp/pc-nzp-linux64.zip
          asset_name: pc-nzp-linux64.zip
          asset_content_type: application/zip
      - name: Upload win32 Archive
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./tmp/pc-nzp-win32.zip
          asset_name: pc-nzp-win32.zip
          asset_content_type: application/zip
      - name: Upload win64 Archive
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./tmp/pc-nzp-win64.zip
          asset_name: pc-nzp-win64.zip
          asset_content_type: application/zip
      - name: Publish Release
        uses: StuYarrow/publish-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          id: ${{ steps.create_release.outputs.id }}

